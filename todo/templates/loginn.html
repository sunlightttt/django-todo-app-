{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">


</head>

<body>
    <div class="signup-login">
        <div class="signup-box">
            <form method="post">
                {% csrf_token %}

                <div class="heading">
                    Log-in
                </div>

                <div class="line"></div>

                <div class="field">
                    <b>Username</b>
                    <input type="text" required class="inp" placeholder="Enter your username" name="fnm">
                </div>


                <div class="field">
                    <b>Password</b>
                    <input type="password" required class="inp" placeholder="Enter your password" name="pwd">
                </div>

                <div class="field">
                    <input type="submit" class="submit-button" value="Submit">
                </div>

                <div class="field">
                    <b>You don't have an acoount</b>
                    <br>
                    <a href="/">Signup</a>
                </div>

            </form>
        </div>
    </div>
</body>

</html>
