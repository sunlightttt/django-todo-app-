<!-- edit.html -->

{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Todo</title>
<link rel="stylesheet" href="{% static 'css/style2.css' %}">


</head>
<body>
    <div class="signup-login">
        <div>
            <h1>Hello {{ user }}</h1>
        </div>

        <div class="signup-box">
            <div class="heading">
                Edit Todo
            </div>

            <form method="post">
                {% csrf_token %}
                <input type="text" class="inp" name="title" required value="{{ todo.title }}">
                <input type="submit" class="submit-button" value="Update Task">
            </form>
        </div>
    </div>
</body>
</html>
